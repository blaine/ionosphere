app = "ionosphere-appview"
primary_region = "sjc"

[build]
  dockerfile = "apps/ionosphere-appview/Dockerfile"
  [build.args]

[env]
  PORT = "8080"
  DB_PATH = "/data/ionosphere.sqlite"
  NODE_ENV = "production"
  PDS_URL = "https://jellybaby.us-east.host.bsky.network"
  JETSTREAM_URL = "wss://jetstream1.us-west.bsky.network"
  PUBLIC_JETSTREAM_URL = "wss://jetstream1.us-west.bsky.network"
  BOT_HANDLE = "ionosphere.tv"
  BOT_DID = "did:plc:lkeq4oghyhnztbu4dxr3joff"
  FRONTEND_URL = "https://ionosphere.tv"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "ionosphere_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "2048mb"
