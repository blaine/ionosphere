services:
  pds:
    image: ghcr.io/bluesky-social/pds:latest
    ports:
      - "2690:3000"
    volumes:
      - ./data/pds:/pds
    environment:
      PDS_DEV_MODE: "true"
      PDS_HOSTNAME: localhost
      PDS_PORT: 3000
      PDS_DATA_DIRECTORY: /pds
      PDS_BLOBSTORE_DISK_LOCATION: /pds/blocks
      PDS_JWT_SECRET: ionosphere-pds-dev-jwt-secret
      PDS_ADMIN_PASSWORD: ionosphere-pds-dev-admin
      PDS_PLC_ROTATION_KEY_K256_PRIVATE_KEY_HEX: "4a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b"
      PDS_INVITE_REQUIRED: "false"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/xrpc/_health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  tap:
    image: ghcr.io/bluesky-social/indigo/tap:latest
    ports:
      - "2580:2580"
    volumes:
      - ./data/tap:/data
    extra_hosts:
      - "localhost:host-gateway"
    environment:
      TAP_RELAY_URL: "http://pds:3000"
      TAP_PLC_URL: "https://plc.directory"
      TAP_DATABASE_URL: "sqlite:///data/tap.db"
      TAP_BIND: ":2580"
    depends_on:
      pds:
        condition: service_healthy
